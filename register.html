<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FiDa Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-theme="light">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <main class="container auth-shell py-4 py-md-5">
      <section class="auth-card panel p-4 p-md-5">
        <p class="badge-chip mb-3">FiDa</p>
        <h1 class="mb-2">Create Account</h1>
        <p class="subtitle mb-4">Register with email and password, then continue to your dashboard.</p>

        <form id="registerForm" class="d-flex flex-column gap-3" novalidate>
          <div>
            <label class="form-label" for="nameInput">Full Name</label>
            <input id="nameInput" class="form-control" type="text" autocomplete="name" required />
          </div>
          <div>
            <label class="form-label" for="emailInput">Email</label>
            <input id="emailInput" class="form-control" type="email" autocomplete="email" required />
          </div>
          <div>
            <label class="form-label" for="countryInput">Country</label>
            <select id="countryInput" class="form-control" required>
              <option value="" disabled selected>Select country</option>
              <option value="AU">Australia</option>
              <option value="CA">Canada</option>
              <option value="DE">Germany</option>
              <option value="IN">India</option>
              <option value="JP">Japan</option>
              <option value="LK">Sri Lanka</option>
              <option value="SG">Singapore</option>
              <option value="AE">United Arab Emirates</option>
              <option value="GB">United Kingdom</option>
              <option value="US">United States</option>
            </select>
          </div>
          <div>
            <label class="form-label" for="passwordInput">Password</label>
            <input
              id="passwordInput"
              class="form-control"
              type="password"
              autocomplete="new-password"
              required
            />
          </div>
          <div>
            <label class="form-label" for="confirmPasswordInput">Confirm Password</label>
            <input
              id="confirmPasswordInput"
              class="form-control"
              type="password"
              autocomplete="new-password"
              required
            />
          </div>
          <button id="registerBtn" type="submit" class="btn btn-brand">Register</button>
        </form>

        <p id="statusMessage" class="status-message mt-3 mb-0">Create an account to get started.</p>
        <p class="auth-switch mt-3 mb-0">
          Already registered?
          <a href="login.html">Sign in</a>
        </p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="fida-common.js"></script>
    <script src="register.js"></script>
  </body>
</html>
