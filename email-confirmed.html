<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Email Confirmed – FiDa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <main class="container auth-shell py-4 py-md-5">
      <section class="auth-card panel p-4 p-md-5 text-center">
        <div class="mb-4">
          <div style="font-size: 3rem; margin-bottom: 1rem;">✓</div>
          <p class="badge-chip mb-3" style="justify-content: center;">FiDa</p>
        </div>
        <h1 class="mb-2">Email Confirmed</h1>
        <p class="subtitle mb-4">Your account is ready to use. Redirecting you to login in a moment...</p>
        <p id="countdownMessage" class="status-message mb-4">Redirecting in 3 seconds...</p>
        <a href="login.html" class="btn btn-brand">Go to Login Now</a>
      </section>
    </main>

    <script>
      let countdown = 3;
      const countdownEl = document.getElementById("countdownMessage");

      function updateCountdown() {
        if (countdown > 0) {
          countdownEl.textContent = `Redirecting in ${countdown} seconds...`;
          countdown--;
          setTimeout(updateCountdown, 1000);
        } else {
          window.location.replace("login.html");
        }
      }

      updateCountdown();
    </script>
  </body>
</html>
