<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FiDa Planning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="dashboard-page planning-page" data-theme="midnight">
    <main class="dashboard-shell">
      <header class="app-topbar">
        <div class="brand">FiDa</div>
        <div class="top-controls">
          <nav class="top-menu-container" aria-label="Primary">
            <a class="top-menu-link" href="index.html">Dashboard</a>
            <a class="top-menu-link" href="finances.html">Finances</a>
            <a class="top-menu-link active" href="goals.html">Planning</a>
            <a class="top-menu-link" href="settings.html">Me</a>
          </nav>
          <select id="globalThemeSelect" class="global-theme-select" aria-label="Theme">
            <option value="light">Light</option>
            <option value="midnight">Midnight</option>
            <option value="slate">Slate</option>
            <option value="monsoon">Monsoon</option>
            <option value="terracotta">Terracotta</option>
          </select>
          <button id="logoutBtn" class="icon-btn power-btn" type="button" aria-label="Logout" title="Logout"></button>
        </div>
      </header>

      <section class="welcome-strip">
        <div class="avatar-badge">G</div>
        <div>
          <h1>Planning</h1>
          <p class="muted-text">Plan upcoming bills and key money commitments.</p>
        </div>
      </section>

      <section class="dashboard-grid-ref finance-grid planning-grid">
        <article class="card planning-list-card">
          <div class="card-head planning-card-head">
            <h2>Active Goals</h2>
            <div class="planning-head-right">
              <div class="planning-bulk-actions" role="group" aria-label="Goal actions">
                <button id="goalDeleteBtn" class="ghost-btn planning-icon-btn" type="button" title="Delete selected goals" aria-label="Delete selected goals" disabled>
                  <svg class="planning-icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M9 3h6l1 2h4v2H4V5h4l1-2zm-3 6h12l-1 11a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L6 9z" fill="currentColor"></path>
                  </svg>
                </button>
                <button id="goalEditBtn" class="ghost-btn planning-icon-btn" type="button" title="Edit selected goal" aria-label="Edit selected goal" disabled>
                  <svg class="planning-icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 16.5V20h3.5L18 9.5 14.5 6 4 16.5zm15.7-9.8a1 1 0 0 0 0-1.4l-1.9-1.9a1 1 0 0 0-1.4 0L15 4.8l3.5 3.5 1.2-1.1z" fill="currentColor"></path>
                  </svg>
                </button>
              </div>
              <div class="planning-action-wrap">
                <button
                  id="goalActionBtn"
                  class="ghost-btn planning-action-btn"
                  type="button"
                  aria-haspopup="true"
                  aria-expanded="false"
                  aria-controls="goalActionMenu"
                  title="Goal actions"
                >
                  +
                </button>
                <div id="goalActionMenu" class="planning-action-menu" hidden>
                  <p class="planning-menu-title">Add Goal</p>
                  <form id="goalForm" class="inline-form planning-inline-form" novalidate>
                    <input id="goalTitleInput" class="form-control" type="text" placeholder="Goal title (e.g. Emergency Fund)" maxlength="120" required />
                    <div class="inline-form-row">
                      <input id="goalAmountInput" class="form-control" type="number" min="0" step="0.01" placeholder="Target amount" required />
                      <input id="goalDateInput" class="form-control" type="date" required />
                    </div>
                    <select id="goalStatusInput" class="form-control">
                      <option value="planned">Planned</option>
                      <option value="in_progress">In Progress</option>
                      <option value="on_hold">On Hold</option>
                    </select>
                    <button id="addGoalBtn" type="submit" class="ghost-btn">Add Goal</button>
                  </form>
                </div>
              </div>
            </div>
          </div>
          <div id="planningGoalsList" class="account-list planning-scroll-list"></div>
        </article>

        <article class="card planning-list-card">
          <div class="card-head planning-card-head">
            <h2>Bills</h2>
            <div class="planning-head-right">
              <div class="planning-bulk-actions" role="group" aria-label="Bill actions">
                <button id="billDeleteBtn" class="ghost-btn planning-icon-btn" type="button" title="Delete selected bills" aria-label="Delete selected bills" disabled>
                  <svg class="planning-icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M9 3h6l1 2h4v2H4V5h4l1-2zm-3 6h12l-1 11a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L6 9z" fill="currentColor"></path>
                  </svg>
                </button>
                <button id="billEditBtn" class="ghost-btn planning-icon-btn" type="button" title="Edit selected bill" aria-label="Edit selected bill" disabled>
                  <svg class="planning-icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 16.5V20h3.5L18 9.5 14.5 6 4 16.5zm15.7-9.8a1 1 0 0 0 0-1.4l-1.9-1.9a1 1 0 0 0-1.4 0L15 4.8l3.5 3.5 1.2-1.1z" fill="currentColor"></path>
                  </svg>
                </button>
              </div>
              <div class="planning-action-wrap">
                <button
                  id="billActionBtn"
                  class="ghost-btn planning-action-btn"
                  type="button"
                  aria-haspopup="true"
                  aria-expanded="false"
                  aria-controls="billActionMenu"
                  title="Bill actions"
                >
                  +
                </button>
                <div id="billActionMenu" class="planning-action-menu" hidden>
                  <p class="planning-menu-title">Add Bill</p>
                  <form id="billForm" class="inline-form planning-inline-form" novalidate>
                    <input id="billNameInput" class="form-control" type="text" placeholder="Bill name (e.g. Rent)" maxlength="100" required />
                    <select id="billAmountTypeInput" class="form-control">
                      <option value="fixed">Fixed amount</option>
                      <option value="tentative">Tentative amount</option>
                    </select>
                    <input id="billDueDateInput" class="form-control" type="date" required />
                    <select id="billFrequencyInput" class="form-control">
                      <option value="monthly">Monthly</option>
                      <option value="bi_monthly">Every 2 months</option>
                      <option value="quarterly">Quarterly (3 months)</option>
                      <option value="half_yearly">Half-yearly (6 months)</option>
                      <option value="yearly">Yearly</option>
                      <option value="one_time">One-time</option>
                      <option value="custom">Custom</option>
                    </select>
                    <div id="billCustomFrequencyRow" class="inline-form-row planning-custom-frequency" hidden>
                      <input id="billCustomIntervalInput" class="form-control" type="number" min="1" step="1" value="2" placeholder="Every N" />
                      <select id="billCustomUnitInput" class="form-control">
                        <option value="week">Week(s)</option>
                        <option value="month" selected>Month(s)</option>
                        <option value="year">Year(s)</option>
                      </select>
                    </div>
                    <button id="addBillBtn" type="submit" class="ghost-btn">Add Bill</button>
                  </form>
                </div>
              </div>
            </div>
          </div>
          <div id="upcomingBillsList" class="account-list planning-scroll-list"></div>
        </article>
      </section>

      <div id="planningEditModal" class="modal-backdrop" hidden>
        <div class="modal-card modal-card-compact planning-edit-modal-card" role="dialog" aria-modal="true" aria-labelledby="planningEditModalTitle">
          <div class="modal-head">
            <h2 id="planningEditModalTitle">Edit</h2>
            <button id="planningEditCloseBtn" class="ghost-btn modal-close-btn planning-icon-close-btn" type="button" aria-label="Close edit dialog">&times;</button>
          </div>
          <form id="planningEditForm" class="inline-form" novalidate>
            <input id="planningEditNameInput" class="form-control" type="text" maxlength="120" required />
            <div id="planningEditMainRow" class="inline-form-row">
              <input id="planningEditAmountInput" class="form-control" type="number" min="0" step="0.01" required />
              <input id="planningEditDateInput" class="form-control" type="date" required />
            </div>
            <select id="planningEditMetaSelect" class="form-control"></select>
            <select id="planningEditAmountTypeSelect" class="form-control" hidden>
              <option value="fixed">Fixed amount</option>
              <option value="tentative">Tentative amount</option>
            </select>
            <select id="planningEditFrequencySelect" class="form-control" hidden>
              <option value="monthly">Monthly</option>
              <option value="bi_monthly">Every 2 months</option>
              <option value="quarterly">Quarterly (3 months)</option>
              <option value="half_yearly">Half-yearly (6 months)</option>
              <option value="yearly">Yearly</option>
              <option value="one_time">One-time</option>
              <option value="custom">Custom</option>
            </select>
            <div id="planningEditCustomFrequencyRow" class="inline-form-row planning-custom-frequency" hidden>
              <input id="planningEditCustomIntervalInput" class="form-control" type="number" min="1" step="1" value="2" placeholder="Every N" />
              <select id="planningEditCustomUnitInput" class="form-control">
                <option value="week">Week(s)</option>
                <option value="month" selected>Month(s)</option>
                <option value="year">Year(s)</option>
              </select>
            </div>
            <div class="modal-actions">
              <button id="planningEditCancelBtn" class="ghost-btn" type="button">Cancel</button>
              <button class="ghost-btn" type="submit">Save changes</button>
            </div>
          </form>
        </div>
      </div>

      <div id="planningDeleteModal" class="modal-backdrop" hidden>
        <div class="modal-card modal-card-compact planning-edit-modal-card" role="dialog" aria-modal="true" aria-labelledby="planningDeleteModalTitle">
          <div class="modal-head">
            <h2 id="planningDeleteModalTitle">Delete Selected Items</h2>
            <button id="planningDeleteCloseBtn" class="ghost-btn modal-close-btn planning-icon-close-btn" type="button" aria-label="Close delete dialog">&times;</button>
          </div>
          <p id="planningDeleteMessage" class="txn-delete-warning"></p>
          <div class="modal-actions">
            <button id="planningDeleteCancelBtn" class="ghost-btn" type="button">Cancel</button>
            <button id="planningDeleteConfirmBtn" class="ghost-btn danger-btn" type="button">Delete</button>
          </div>
        </div>
      </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="fida-common.js"></script>
    <script src="goals.js"></script>
  </body>
</html>
